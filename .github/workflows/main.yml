name: Deploy a Surge

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Surge
        run: npm install --global surge

      - name: Desplegar a Surge
        run: surge --project ./ --domain practica-surge-iverson.surge.sh --token ${{ secrets.SURGE_TOKEN }}
